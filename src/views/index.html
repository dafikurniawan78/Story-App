<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <title><%= htmlWebpackPlugin.options.title %> | Story App</title>
</head>
<body>

  <app-navbar active-page="index"></app-navbar>

<div class="page-wrapper">

  <hero-section></hero-section>

  <!-- STORIES SECTION -->
  <section class="stories-section" id="stories">
    <div class="container">
      <stories-header></stories-header>
      <!-- Lit Component: story-list -->
      <story-list id="storyListEl"></story-list>
    </div>
  </section>

</div>

<!-- Lit Component: app-footer -->
<app-footer></app-footer>

<!-- Toast (Bootstrap #4) -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:2000;">
  <div id="liveToast" class="toast toast-story align-items-center bg-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"><i class="bi bi-camera-reels-fill text-warning me-2"></i>Selamat datang di <strong>StoryApp</strong>!</div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</body>
</html>
