<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="favicon.png" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <title><%= htmlWebpackPlugin.options.title %> | Story App</title>
</head>
<body>

  <app-navbar active-page="index"></app-navbar>

<div class="page-wrapper">

  <hero-section></hero-section>

  <!-- STORIES SECTION -->
  <section class="stories-section" id="stories">
    <div class="container">
      <div class="section-header">
        <div>
          <h2 class="section-header__title">Semua <span>Stories</span></h2>
          <p class="section-header__subtitle"><i class="bi bi-clock me-1"></i>Diperbarui secara berkala</p>
        </div>
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <!-- Input Group (Bootstrap #2) -->
          <div class="input-group input-group-sm" style="width:220px;">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" id="searchInput" class="form-control border-start-0 ps-0" placeholder="Cari story..." oninput="filterStories(this.value)" />
          </div>
          <!-- Dropdown (Bootstrap #3) -->
          <div class="dropdown">
            <button class="btn btn-outline-secondary btn-sm dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-filter me-1"></i>Filter
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 rounded-3">
              <li><h6 class="dropdown-header">Urutkan</h6></li>
              <li><a class="dropdown-item" href="#">Terbaru</a></li>
              <li><a class="dropdown-item" href="#">Terlama</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">A-Z</a></li>
            </ul>
          </div>
        </div>
      </div>
      <!-- Lit Component: story-list -->
      <story-list id="storyListEl"></story-list>
    </div>
  </section>

</div>

<!-- Lit Component: app-footer -->
<app-footer></app-footer>

<!-- Toast (Bootstrap #4) -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:2000;">
  <div id="liveToast" class="toast toast-story align-items-center bg-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body"><i class="bi bi-camera-reels-fill text-warning me-2"></i>Selamat datang di <strong>StoryApp</strong>!</div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

</body>
</html>
